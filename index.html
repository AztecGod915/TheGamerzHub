<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-clean.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Preconnect to external APIs (faster first fetch) ────── -->
    <link rel="preconnect" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://site.api.espn.com" />
    <link rel="dns-prefetch" href="https://api.themoviedb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://site.api.espn.com" />

    <!-- ─── Primary SEO ─────────────────────────────────────────── -->
    <title>The StreamHub — AI Streaming Assistant &amp; Sports Hub</title>
    <meta name="description" content="AI finds what to watch across every streaming service. Live sports, scores & more—all in one place." />
    <meta name="keywords" content="where to watch, streaming guide, Netflix, Hulu, Disney Plus, Max, Apple TV, AI movie search, World Cup 2026, sports scores, streaming assistant" />
    <meta name="author" content="The StreamHub" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://thestreamhub.app" />

    <!-- ─── Open Graph (Facebook, iMessage, WhatsApp, LinkedIn) ─── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://thestreamhub.app" />
    <meta property="og:title"       content="The StreamHub — AI Streaming Assistant &amp; Sports Hub" />
    <meta property="og:description" content="AI searches every streaming service. Sports Hub with favorite teams, schedules & live scores. Stream smarter!" />
    <meta property="og:image"       content="https://thestreamhub.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="The StreamHub" />

    <!-- ─── Twitter / X Card ────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="The StreamHub — AI Streaming Assistant" />
    <meta name="twitter:description" content="AI finds what to watch across Netflix, Hulu, Disney+, Max and more. Live sports scores too." />
    <meta name="twitter:image"       content="https://thestreamhub.app/og-image.png" />

    <!-- ─── Mobile & PWA ────────────────────────────────────────── -->
    <meta name="theme-color" content="#09070F" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StreamHub" />
    <link rel="apple-touch-icon" href="/logo-clean.png" />

    <!-- ─── Google Analytics 4 ──────────────────────────────────── -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LK433DT8M2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LK433DT8M2', {
        page_title: document.title,
        page_location: window.location.href,
      });
    </script>

    <!-- ─── Structured Data (Google rich results) ───────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "The StreamHub",
      "url": "https://thestreamhub.app",
      "description": "AI-powered streaming guide with live sports scores, mood-based movie search, and cross-platform streaming availability.",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI Mood Search",
        "Live Sports Scores",
        "World Cup 2026 Schedule",
        "Streaming Availability",
        "Watchlist",
        "Movie & TV Ratings"
      ]
    }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
